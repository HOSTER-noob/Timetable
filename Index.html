<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOMENTUM Schedule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>MOMENTUM</h1>
            <p class="subtitle">MONDAY – FRIDAY</p>
            <div id="current-status" class="status-box">Loading status...</div>
        </header>

        <main>
            <table class="timetable">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Activity</th>
                    </tr>
                </thead>
                <tbody id="schedule-body">
                    </tbody>
            </table>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
